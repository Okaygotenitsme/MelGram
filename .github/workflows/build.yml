name: Build Telegram APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;21.4.7075529"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/21.4.7075529" >> $GITHUB_ENV

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/21.4.7075529" >> local.properties

      - name: Create keystore
        run: |
          keytool -genkey -v \
            -keystore release.jks \
            -alias telegram \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -dname "CN=Telegram, OU=Dev, O=Dev, L=City, S=State, C=US"

      - name: Inject API credentials
        run: |
          sed -i 's/APP_ID = [0-9]*/APP_ID = ${{ secrets.TELEGRAM_APP_ID }}/' \
            TMessagesProj/src/main/java/org/telegram/messenger/BuildVars.java
          sed -i 's/APP_HASH = "[^"]*"/APP_HASH = "${{ secrets.TELEGRAM_APP_HASH }}"/' \
            TMessagesProj/src/main/java/org/telegram/messenger/BuildVars.java

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: |
          ./gradlew assembleAfatRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=telegram \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-Fork-APK
          path: TMessagesProj/build/outputs/apk/afat/release/*.apk
          retention-days: 30
